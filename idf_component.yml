version: "2.0.0"
license: "GPL-3.0"
description: "This is a library for managing lilygo devices."
url: https://github.com/Xinyuan-LilyGO/lilygo_device_driver

dependencies:
  idf: ">=5.5.3"

  llgok/cpp_bus_driver:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  llgok/arduino_cpp_bus_driver:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  llgok/radiolib_cpp_bus_driver:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  llgok/kode_bq25896:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  llgok/ICM20948_WE:
    version: "^1.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"
