  radiolib_cpp_bus_driver:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  kode_bq25896:
    version: "^2.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  ICM20948_WE:
    version: "^1.0.0"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"
